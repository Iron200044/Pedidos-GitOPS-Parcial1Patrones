frontend:
  image: nicou21/pedido-frontend
  tag: dev
  replicaCount: 1
  service:
    type: ClusterIP
    port: 80
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "200m"
      memory: "256Mi"

backend:
  image: nicou21/pedido-backend
  tag: dev
  replicaCount: 1
  service:
    port: 8080
  env:
    - name: SPRING_DATASOURCE_URL
      value: jdbc:postgresql://pedido-app-dev-postgresql:5432/pedidos

    - name: SPRING_DATASOURCE_USERNAME
      value: pedido

    - name: SPRING_DATASOURCE_PASSWORD
      value: pedido123

  resources:
    requests:
      cpu: "200m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70

postgresql:
  enabled: true
  auth:
    username: pedido
    password: pedido123
    database: pedidos

  primary:
    persistence:
      enabled: true
      size: 1Gi

ingress:
  enabled: true
  host: pedido-dev.local

  